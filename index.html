<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maria Teresa Sanogal | Financial Virtual Assistant</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
    
    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cream: '#FAF9F6',
                        espresso: '#3C2A21',
                        taupe: '#634832',
                        sand: '#D4C5B9',
                        warm: '#F5F1ED'
                    },
                    fontFamily: {
                        serif: ['Playfair Display', 'serif'],
                        sans: ['Inter', 'sans-serif']
                    }
                }
            }
        }
    </script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html {
            scroll-behavior: smooth;
        }
        
        /* Smooth Scroll Reveal Animation */
        @keyframes reveal-up {
            0% {
                opacity: 0;
                transform: translateY(40px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes reveal-fade {
            0% {
                opacity: 0;
                transform: scale(0.98);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        @keyframes float {
            0%, 100% {
                transform: translateY(0) translateX(0);
            }
            25% {
                transform: translateY(-20px) translateX(10px);
            }
            50% {
                transform: translateY(-10px) translateX(-10px);
            }
            75% {
                transform: translateY(-30px) translateX(5px);
            }
        }
        
        @keyframes gradient-shift {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }
        
        @keyframes rotate-slow {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }
        
        /* Hero Animated Background */
        .hero-bg {
            position: relative;
            overflow: hidden;
        }
        
        .hero-bg::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 30%, rgba(212, 197, 185, 0.3) 0%, transparent 50%),
                        radial-gradient(circle at 70% 70%, rgba(99, 72, 50, 0.08) 0%, transparent 50%),
                        radial-gradient(circle at 50% 50%, rgba(245, 241, 237, 0.5) 0%, transparent 50%);
            animation: gradient-shift 15s ease infinite;
            background-size: 60% 60%;
        }
        
        .floating-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.4;
            animation: float 20s ease-in-out infinite;
        }
        
        .blob-1 {
            width: 400px;
            height: 400px;
            background: linear-gradient(135deg, #D4C5B9, #F5F1ED);
            top: 10%;
            right: 10%;
            animation-delay: 0s;
        }
        
        .blob-2 {
            width: 300px;
            height: 300px;
            background: linear-gradient(135deg, #634832, #D4C5B9);
            bottom: 20%;
            left: 5%;
            animation-delay: -5s;
            opacity: 0.15;
        }
        
        .blob-3 {
            width: 250px;
            height: 250px;
            background: linear-gradient(135deg, #3C2A21, #634832);
            top: 40%;
            left: 30%;
            animation-delay: -10s;
            opacity: 0.08;
        }
        
        /* Orbit decoration */
        .orbit-ring {
            position: absolute;
            border: 1px solid rgba(99, 72, 50, 0.1);
            border-radius: 50%;
            animation: rotate-slow 60s linear infinite;
        }
        
        .orbit-ring-1 {
            width: 600px;
            height: 600px;
            top: -100px;
            right: -100px;
        }
        
        .orbit-ring-2 {
            width: 800px;
            height: 800px;
            top: -200px;
            right: -200px;
            border-style: dashed;
            animation-direction: reverse;
            animation-duration: 80s;
        }
        
        /* Glass Nav */
        .glass-nav {
            background: rgba(250, 249, 246, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        
        /* Scroll Reveal Section */
        .reveal-section {
            animation: reveal-up 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        
        .reveal-content {
            transition: transform 0.5s ease, opacity 0.5s ease;
        }
        
        /* Hover underline */
        .hover-underline {
            position: relative;
        }
        
        .hover-underline::after {
            content: '';
            position: absolute;
            width: 0;
            height: 1px;
            bottom: -2px;
            left: 0;
            background-color: #3C2A21;
            transition: width 0.3s ease;
        }
        
        .hover-underline:hover::after {
            width: 100%;
        }
        
        /* Tool Card Animations */
        @keyframes float-subtle {
            0%, 100% {
                transform: translateY(0) rotate(0deg);
            }
            50% {
                transform: translateY(-6px) rotate(0.5deg);
            }
        }
        
        @keyframes icon-pop {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.15);
            }
        }
        
        .tool-float {
            animation: float-subtle 5s ease-in-out infinite;
        }
        
        .tool-float:nth-child(2) { animation-delay: 0.3s; }
        .tool-float:nth-child(3) { animation-delay: 0.6s; }
        .tool-float:nth-child(4) { animation-delay: 0.9s; }
        .tool-float:nth-child(5) { animation-delay: 1.2s; }
        .tool-float:nth-child(6) { animation-delay: 1.5s; }
        .tool-float:nth-child(7) { animation-delay: 1.8s; }
        .tool-float:nth-child(8) { animation-delay: 2.1s; }
        .tool-float:nth-child(9) { animation-delay: 2.4s; }
        .tool-float:nth-child(10) { animation-delay: 2.7s; }
        .tool-float:nth-child(11) { animation-delay: 3s; }
        .tool-float:nth-child(12) { animation-delay: 3.3s; }
        .tool-float:nth-child(13) { animation-delay: 3.6s; }
        
        .tool-icon-animate:hover svg {
            animation: icon-pop 0.4s ease-in-out;
        }
        
        .tool-card-hover {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .tool-card-hover:hover {
            transform: translateY(-10px) scale(1.03);
            box-shadow: 0 20px 40px rgba(60, 42, 33, 0.12);
        }
        
        /* Service card floating animation */
        @keyframes service-float {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }
        
        .service-float {
            animation: service-float 6s ease-in-out infinite;
        }
        
        .service-float:nth-child(1) { animation-delay: 0s; }
        .service-float:nth-child(2) { animation-delay: 1.5s; }
        .service-float:nth-child(3) { animation-delay: 3s; }
        .service-float:nth-child(4) { animation-delay: 4.5s; }
        
        .service-card-hover {
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .service-card-hover:hover {
            transform: translateY(-12px) scale(1.02);
            box-shadow: 0 25px 50px rgba(60, 42, 33, 0.15);
        }
        
        /* Profile photo floating animation */
        @keyframes profile-float {
            0%, 100% {
                transform: translateY(0) translateX(0);
            }
            25% {
                transform: translateY(-8px) translateX(4px);
            }
            50% {
                transform: translateY(-4px) translateX(-4px);
            }
            75% {
                transform: translateY(-12px) translateX(2px);
            }
        }
        
        @keyframes profile-glow {
            0%, 100% {
                box-shadow: 0 20px 40px rgba(60, 42, 33, 0.15);
            }
            50% {
                box-shadow: 0 30px 60px rgba(60, 42, 33, 0.25);
            }
        }
        
        .profile-animate {
            animation: profile-float 6s ease-in-out infinite, profile-glow 4s ease-in-out infinite;
        }
        
        /* Experience timeline stacked card animation */
        @keyframes stack-in {
            0% {
                opacity: 0;
                transform: translateX(-30px) scale(0.95);
            }
            100% {
                opacity: 1;
                transform: translateX(0) scale(1);
            }
        }
        
        @keyframes stack-float {
            0%, 100% {
                transform: translateY(0) rotate(0deg);
            }
            50% {
                transform: translateY(-4px) rotate(0.3deg);
            }
        }
        
        .experience-stack {
            animation: stack-float 7s ease-in-out infinite;
        }
        
        .experience-stack:nth-child(1) { animation-delay: 0s; }
        .experience-stack:nth-child(2) { animation-delay: 1.2s; }
        .experience-stack:nth-child(3) { animation-delay: 2.4s; }
        .experience-stack:nth-child(4) { animation-delay: 3.6s; }
        .experience-stack:nth-child(5) { animation-delay: 4.8s; }
        .experience-stack:nth-child(6) { animation-delay: 6s; }
        
        .experience-card {
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        
        .experience-card:hover {
            transform: translateY(-6px) translateX(4px);
            box-shadow: 0 15px 35px rgba(60, 42, 33, 0.1);
        }
        
        /* Elegant CTA attention animation */
        @keyframes attention-pulse {
            0%, 100% {
                box-shadow: 0 4px 15px rgba(60, 42, 33, 0.15);
                transform: translateY(0);
            }
            50% {
                box-shadow: 0 8px 25px rgba(60, 42, 33, 0.25);
                transform: translateY(-2px);
            }
        }
        
        @keyframes gentle-breathe {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.02);
            }
        }
        
        .btn-bouncy {
            animation: attention-pulse 3s ease-in-out infinite, gentle-breathe 4s ease-in-out infinite;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }
        
        .btn-bouncy::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }
        
        .btn-bouncy:hover::before {
            left: 100%;
        }
        
        .btn-bouncy:hover {
            transform: scale(1.05) translateY(-3px);
            box-shadow: 0 12px 30px rgba(60, 42, 33, 0.3);
        }
        
        .btn-bouncy:active {
            transform: scale(0.98) translateY(-1px);
        }
        
    </style>
</head>
<body class="bg-cream text-espresso font-sans antialiased">
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        // Navigation Component
        const Navigation = () => {
            const [scrolled, setScrolled] = useState(false);
            
            useEffect(() => {
                const handleScroll = () => {
                    setScrolled(window.scrollY > 50);
                };
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);
            
            const navLinks = [
                { name: 'About', href: '#about' },
                { name: 'Services', href: '#services' },
                { name: 'Experience', href: '#experience' },
                { name: 'Tools', href: '#tools' },
                { name: 'Contact', href: '#contact' }
            ];
            
            return (
                <nav className={`fixed top-0 left-0 right-0 z-50 transition-all duration-500 ${scrolled ? 'glass-nav shadow-sm' : 'bg-transparent'}`}>
                    <div className="max-w-7xl mx-auto px-6 lg:px-8">
                        <div className="flex items-center justify-between h-20">
                            <a href="#" className="font-serif text-xl font-semibold tracking-wide text-espresso">
                                MTS.
                            </a>
                            
                            <div className="hidden md:flex items-center space-x-10">
                                {navLinks.map((link) => (
                                    <a
                                        key={link.name}
                                        href={link.href}
                                        className="text-sm font-medium tracking-widest uppercase text-taupe hover-underline hover:text-espresso transition-colors"
                                    >
                                        {link.name}
                                    </a>
                                ))}
                            </div>
                            
                            <a
                                href="#contact"
                                className="hidden md:inline-flex px-6 py-2.5 bg-espresso text-cream text-sm font-medium tracking-wide rounded-full hover:bg-taupe btn-bouncy"
                            >
                                Hire Me
                            </a>
                        </div>
                    </div>
                </nav>
            );
        };
        
        // Hero Section
        const Hero = () => {
            const [isVisible, setIsVisible] = useState(false);
            
            useEffect(() => {
                setIsVisible(true);
            }, []);
            
            return (
                <section className="min-h-screen flex items-center pt-20 bg-cream hero-bg">
                    {/* Animated Background Elements */}
                    <div className="floating-blob blob-1"></div>
                    <div className="floating-blob blob-2"></div>
                    <div className="floating-blob blob-3"></div>
                    <div className="orbit-ring orbit-ring-1"></div>
                    <div className="orbit-ring orbit-ring-2"></div>
                    
                    <div className="max-w-7xl mx-auto px-6 lg:px-8 w-full relative z-10">
                        <div className="grid lg:grid-cols-2 gap-12 lg:gap-20 items-center">
                            {/* Left Content */}
                            <div className={`space-y-8 reveal-content transition-all duration-1000 ${isVisible ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-8'}`}>
                                <div className="space-y-4">
                                    <h1 className="font-serif text-5xl lg:text-7xl font-semibold text-espresso leading-tight tracking-tight">
                                        Maria Teresa<br />
                                        <span className="text-taupe">Sanogal</span>
                                    </h1>
                                    
                                    <p className="font-serif text-2xl lg:text-3xl text-taupe italic leading-relaxed">
                                        Where Financial Precision<br />Meets Virtual Excellence
                                    </p>
                                </div>
                                
                                <p className="text-lg text-taupe/80 max-w-md leading-relaxed">
                                    Bridging the gap between numbers and relationships. I bring 10+ years of expertise in Accounts Payable/Receivable and world-class Virtual Assistance to help your business thrive.
                                </p>
                                
                                <div className="flex flex-wrap gap-4 pt-4">
                                    <a
                                        href="#contact"
                                        className="px-8 py-4 bg-espresso text-cream font-medium tracking-wide rounded-full hover:bg-taupe shadow-lg btn-bouncy"
                                    >
                                        Hire Me
                                    </a>
                                    <a
                                        href="#experience"
                                        className="px-8 py-4 border border-taupe text-espresso font-medium tracking-wide rounded-full hover:bg-espresso hover:text-cream hover:border-espresso btn-bouncy"
                                    >
                                        View Experience
                                    </a>
                                </div>
                            </div>
                            
                            {/* Right Image */}
                            <div className={`flex justify-center lg:justify-center transition-all duration-1000 delay-300 reveal-content ${isVisible ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-8'}`}>
                                <div className="relative">
                                    <div className="w-72 h-72 lg:w-96 lg:h-96 rounded-full bg-gradient-to-br from-sand to-warm shadow-2xl border-4 border-white flex items-center justify-center mx-auto overflow-hidden">
                                        <img 
                                            src="maria-profile.jpg.png" 
                                            alt="Maria Teresa Sanogal" 
                                            className="w-full h-full object-cover"
                                        />
                                    </div>
                                    <div className="absolute -bottom-4 -right-4 w-24 h-24 bg-espresso rounded-full flex items-center justify-center text-cream font-serif text-sm text-center leading-tight p-2">
                                        10+ Years<br />Exp.
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            );
        };
        
        // About Section
        const About = () => {
            const sectionRef = useRef(null);
            const [isVisible, setIsVisible] = useState(false);
            
            useEffect(() => {
                const observer = new IntersectionObserver(
                    ([entry]) => {
                        if (entry.isIntersecting) {
                            setIsVisible(true);
                        }
                    },
                    { threshold: 0.2 }
                );
                
                if (sectionRef.current) {
                    observer.observe(sectionRef.current);
                }
                
                return () => observer.disconnect();
            }, []);
            
            return (
                <section id="about" ref={sectionRef} className={`py-24 lg:py-32 bg-cream ${isVisible ? 'reveal-section' : ''}`}>
                    <div className="max-w-4xl mx-auto px-6 lg:px-8 text-center">
                        <div className={`space-y-8 reveal-content transition-all duration-1000 ${isVisible ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-8'}`}>
                            <div className="space-y-4">
                                <h2 className="font-serif text-3xl md:text-4xl lg:text-5xl text-espresso">Professional Summary</h2>
                                <p className="font-serif text-xl md:text-2xl text-taupe italic">
                                    Finance meets virtual excellence — a decade of remote-ready expertise
                                </p>
                            </div>
                            
                            <div className="space-y-6 text-taupe/90 text-base md:text-lg leading-relaxed px-2 md:px-0">
                                <p>
                                    Currently serving as an Accounts Payable Specialist in the healthcare sector, I bring precision to financial operations through QuickBooks expertise, vendor management, and meticulous compliance adherence. Prior to this, I spent eight months as a Virtual Assistant managing high-touch client relationships, community engagement, and landing page development using Monday.com and Canva — seamlessly blending creative tech skills with operational excellence.
                                </p>
                                <p>
                                    My foundation in finance was built at DXC Technology as a Finance Analyst, where I pioneered Sonova operations in the Philippines by developing SOPs that streamlined AP/AR processes across international teams. This built upon five years of customer success experience at Amazon, where I delivered world-class support in a fast-paced environment while mastering stakeholder communication and issue resolution.
                                </p>
                                <p>
                                    From my early days pioneering operations at Clearsource BPO to today, I have consistently demonstrated the ability to adapt across industries — finance, healthcare, e-commerce, and remote services. This unique combination of financial acumen and virtual assistance capabilities positions me to deliver immediate value to remote teams seeking a detail-oriented professional who understands both the numbers and the human side of business operations.
                                </p>
                            </div>
                        </div>
                    </div>
                </section>
            );
        };
        
        // Services Section
        const Services = () => {
            const sectionRef = useRef(null);
            const [isVisible, setIsVisible] = useState(false);
            
            useEffect(() => {
                const observer = new IntersectionObserver(
                    ([entry]) => {
                        if (entry.isIntersecting) {
                            setIsVisible(true);
                        }
                    },
                    { threshold: 0.2 }
                );
                
                if (sectionRef.current) {
                    observer.observe(sectionRef.current);
                }
                
                return () => observer.disconnect();
            }, []);
            
            const services = [
                {
                    icon: (
                        <svg className="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                    ),
                    title: "Financial Management",
                    items: ["Accounts Payable & Receivable", "QuickBooks Administration", "JD Edwards ERP Systems", "Financial Reporting & Analysis"]
                },
                {
                    icon: (
                        <svg className="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                        </svg>
                    ),
                    title: "Administrative Support",
                    items: ["Calendar & Schedule Management", "Email & Communication", "Travel Coordination", "Executive Assistance"]
                },
                {
                    icon: (
                        <svg className="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                        </svg>
                    ),
                    title: "Landing Page Builder",
                    items: ["Simple Landing Page Creation", "Basic Automation Setup", "Lead Capture Forms", "Email Integration"],
                    hasSample: true,
                    sampleLink: "webinar-landing-page.html",
                    sampleTitle: "View Sample: Wellness Webinar →"
                },
                {
                    icon: (
                        <svg className="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M18.364 5.636l-3.536 3.536m0 5.656l3.536 3.536M9.172 9.172L5.636 5.636m3.536 9.192l-3.536 3.536M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                    ),
                    title: "Customer Success",
                    items: ["Zendesk Support Management", "Salesforce CRM", "Technical Support", "Client Relations"]
                }
            ];
            
            return (
                <section id="services" ref={sectionRef} className={`py-24 lg:py-32 bg-warm ${isVisible ? 'reveal-section' : ''}`}>
                    <div className="max-w-7xl mx-auto px-6 lg:px-8">
                        <div className={`text-center mb-16 reveal-content transition-all duration-1000 ${isVisible ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-8'}`}>
                            <h2 className="font-serif text-4xl lg:text-5xl text-espresso mb-4">Services & Expertise</h2>
                            <p className="font-serif text-2xl text-taupe italic">Four pillars of professional excellence</p>
                        </div>
                        
                        <div className="grid md:grid-cols-2 lg:grid-cols-4 gap-8">
                            {services.map((service, index) => (
                                <div
                                    key={service.title}
                                    className={`bg-cream rounded-2xl p-8 shadow-sm hover:shadow-xl service-float service-card-hover ${isVisible ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-8'}`}
                                    style={{ transitionDelay: `${index * 150}ms` }}
                                >
                                    <div className="w-16 h-16 bg-espresso rounded-xl flex items-center justify-center text-cream mb-6 group-hover:scale-110 transition-transform">
                                        {service.icon}
                                    </div>
